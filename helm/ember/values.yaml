replicaCount: 1

image:
  repository: ember
  tag: latest
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 6379

ember:
  port: 6379
  metricsPort: 9100
  maxMemory: ""
  evictionPolicy: noeviction
  appendonly: false
  appendfsync: everysec
  concurrent: false
  requirepass: ""

resources: {}
  # limits:
  #   cpu: "2"
  #   memory: 512Mi
  # requests:
  #   cpu: 500m
  #   memory: 256Mi

serviceAccount:
  create: true
  name: ""

# persistence configuration.
#
# by default ember uses emptyDir, which means all data is lost when the pod
# restarts. for production deployments enable persistence to survive pod
# restarts, rolling updates, and node rescheduling.
#
# to enable: set enabled=true and ensure ember.appendonly=true so data
# is actually written to the volume.
persistence:
  enabled: false
  # use an existing PVC instead of creating one
  existingClaim: ""
  size: 10Gi
  accessMode: ReadWriteOnce
  # leave storageClass empty to use the cluster default
  storageClass: ""
