syntax = "proto3";
package ember.v1;

option go_package = "github.com/kacy/ember-go/proto/ember/v1;emberv1";

// EmberCache provides a gRPC interface to ember's key-value store.
// all commands route through the same engine as RESP3, so behavior
// is identical regardless of protocol.
service EmberCache {
  // --- strings ---

  rpc Get(GetRequest) returns (GetResponse);
  rpc Set(SetRequest) returns (SetResponse);
  rpc Del(DelRequest) returns (DelResponse);
  rpc MGet(MGetRequest) returns (MGetResponse);
  rpc MSet(MSetRequest) returns (MSetResponse);
  rpc Incr(IncrRequest) returns (IntResponse);
  rpc IncrBy(IncrByRequest) returns (IntResponse);
  rpc DecrBy(DecrByRequest) returns (IntResponse);
  rpc IncrByFloat(IncrByFloatRequest) returns (FloatResponse);
  rpc Append(AppendRequest) returns (IntResponse);
  rpc Strlen(StrlenRequest) returns (IntResponse);

  // --- keys ---

  rpc Exists(ExistsRequest) returns (IntResponse);
  rpc Expire(ExpireRequest) returns (BoolResponse);
  rpc PExpire(PExpireRequest) returns (BoolResponse);
  rpc Persist(PersistRequest) returns (BoolResponse);
  rpc Ttl(TtlRequest) returns (TtlResponse);
  rpc PTtl(PTtlRequest) returns (TtlResponse);
  rpc Type(TypeRequest) returns (TypeResponse);
  rpc Keys(KeysRequest) returns (KeysResponse);
  rpc Rename(RenameRequest) returns (StatusResponse);
  rpc Scan(ScanRequest) returns (ScanResponse);

  // --- lists ---

  rpc LPush(LPushRequest) returns (IntResponse);
  rpc RPush(RPushRequest) returns (IntResponse);
  rpc LPop(LPopRequest) returns (GetResponse);
  rpc RPop(RPopRequest) returns (GetResponse);
  rpc LRange(LRangeRequest) returns (ArrayResponse);
  rpc LLen(LLenRequest) returns (IntResponse);

  // --- hashes ---

  rpc HSet(HSetRequest) returns (IntResponse);
  rpc HGet(HGetRequest) returns (GetResponse);
  rpc HGetAll(HGetAllRequest) returns (HashResponse);
  rpc HDel(HDelRequest) returns (IntResponse);
  rpc HExists(HExistsRequest) returns (BoolResponse);
  rpc HLen(HLenRequest) returns (IntResponse);
  rpc HIncrBy(HIncrByRequest) returns (IntResponse);
  rpc HKeys(HKeysRequest) returns (KeysResponse);
  rpc HVals(HValsRequest) returns (ArrayResponse);
  rpc HMGet(HMGetRequest) returns (OptionalArrayResponse);

  // --- sets ---

  rpc SAdd(SAddRequest) returns (IntResponse);
  rpc SRem(SRemRequest) returns (IntResponse);
  rpc SMembers(SMembersRequest) returns (KeysResponse);
  rpc SIsMember(SIsMemberRequest) returns (BoolResponse);
  rpc SCard(SCardRequest) returns (IntResponse);

  // --- sorted sets ---

  rpc ZAdd(ZAddRequest) returns (IntResponse);
  rpc ZRem(ZRemRequest) returns (IntResponse);
  rpc ZScore(ZScoreRequest) returns (OptionalFloatResponse);
  rpc ZRank(ZRankRequest) returns (OptionalIntResponse);
  rpc ZCard(ZCardRequest) returns (IntResponse);
  rpc ZRange(ZRangeRequest) returns (ZRangeResponse);

  // --- vectors ---
  // only available when the server is built with the vector feature.

  rpc VAdd(VAddRequest) returns (BoolResponse);
  rpc VAddBatch(VAddBatchRequest) returns (IntResponse);
  rpc VSim(VSimRequest) returns (VSimResponse);
  rpc VRem(VRemRequest) returns (BoolResponse);
  rpc VGet(VGetRequest) returns (VGetResponse);
  rpc VCard(VCardRequest) returns (IntResponse);
  rpc VDim(VDimRequest) returns (IntResponse);
  rpc VInfo(VInfoRequest) returns (VInfoResponse);

  // --- server ---

  rpc Ping(PingRequest) returns (PingResponse);
  rpc Echo(EchoRequest) returns (EchoResponse);
  rpc Decr(DecrRequest) returns (IntResponse);
  rpc Unlink(UnlinkRequest) returns (DelResponse);
  rpc FlushDb(FlushDbRequest) returns (StatusResponse);
  rpc DbSize(DbSizeRequest) returns (IntResponse);
  rpc Info(InfoRequest) returns (InfoResponse);
  rpc BgSave(BgSaveRequest) returns (StatusResponse);
  rpc BgRewriteAof(BgRewriteAofRequest) returns (StatusResponse);

  // --- slowlog ---

  rpc SlowLogGet(SlowLogGetRequest) returns (SlowLogGetResponse);
  rpc SlowLogLen(SlowLogLenRequest) returns (IntResponse);
  rpc SlowLogReset(SlowLogResetRequest) returns (StatusResponse);

  // --- pub/sub ---

  rpc Publish(PublishRequest) returns (IntResponse);
  rpc Subscribe(SubscribeRequest) returns (stream SubscribeEvent);
  rpc PubSubChannels(PubSubChannelsRequest) returns (KeysResponse);
  rpc PubSubNumSub(PubSubNumSubRequest) returns (PubSubNumSubResponse);
  rpc PubSubNumPat(PubSubNumPatRequest) returns (IntResponse);

  // --- strings (extended) ---

  rpc GetDel(GetDelRequest) returns (GetResponse);
  rpc GetEx(GetExRequest) returns (GetResponse);
  rpc GetRange(GetRangeRequest) returns (GetResponse);
  rpc SetRange(SetRangeRequest) returns (IntResponse);

  // --- keys (extended) ---

  rpc Copy(CopyRequest) returns (BoolResponse);
  rpc RandomKey(RandomKeyRequest) returns (GetResponse);
  rpc Touch(TouchRequest) returns (IntResponse);

  // --- lists (extended) ---

  rpc LIndex(LIndexRequest) returns (GetResponse);
  rpc LSet(LSetRequest) returns (StatusResponse);
  rpc LTrim(LTrimRequest) returns (StatusResponse);
  rpc LInsert(LInsertRequest) returns (IntResponse);
  rpc LRem(LRemRequest) returns (IntResponse);
  rpc LPos(LPosRequest) returns (OptionalIntResponse);
  rpc LMove(LMoveRequest) returns (GetResponse);

  // --- sets (extended) ---

  rpc SUnion(SUnionRequest) returns (KeysResponse);
  rpc SInter(SInterRequest) returns (KeysResponse);
  rpc SDiff(SDiffRequest) returns (KeysResponse);
  rpc SUnionStore(SUnionStoreRequest) returns (IntResponse);
  rpc SInterStore(SInterStoreRequest) returns (IntResponse);
  rpc SDiffStore(SDiffStoreRequest) returns (IntResponse);
  rpc SRandMember(SRandMemberRequest) returns (ArrayResponse);
  rpc SPop(SPopRequest) returns (ArrayResponse);
  rpc SMisMember(SMisMemberRequest) returns (BoolArrayResponse);

  // --- hashes (extended) ---

  rpc HScan(HScanRequest) returns (HScanResponse);

  // --- sorted sets (extended) ---

  rpc ZRevRank(ZRevRankRequest) returns (OptionalIntResponse);
  rpc ZRevRange(ZRevRangeRequest) returns (ZRangeResponse);
  rpc ZCount(ZCountRequest) returns (IntResponse);
  rpc ZIncrBy(ZIncrByRequest) returns (FloatResponse);
  rpc ZRangeByScore(ZRangeByScoreRequest) returns (ZRangeResponse);
  rpc ZRevRangeByScore(ZRevRangeByScoreRequest) returns (ZRangeResponse);
  rpc ZPopMin(ZPopMinRequest) returns (ZRangeResponse);
  rpc ZPopMax(ZPopMaxRequest) returns (ZRangeResponse);
  rpc ZDiff(ZDiffRequest) returns (ZRangeResponse);
  rpc ZInter(ZInterRequest) returns (ZRangeResponse);
  rpc ZUnion(ZUnionRequest) returns (ZRangeResponse);
  rpc ZScan(ZScanRequest) returns (ZScanResponse);

  // --- scans ---

  rpc SScan(SScanRequest) returns (SScanResponse);

  // --- server (extended) ---

  rpc Time(TimeRequest) returns (TimeResponse);
  rpc LastSave(LastSaveRequest) returns (IntResponse);

  // --- keys (new) ---

  rpc Expiretime(ExpiretimeRequest)   returns (IntResponse);
  rpc Pexpiretime(PexpiretimeRequest) returns (IntResponse);
  rpc Expireat(ExpireatRequest)       returns (BoolResponse);
  rpc Pexpireat(PexpireatRequest)     returns (BoolResponse);

  // --- strings (new) ---

  rpc Getset(GetsetRequest)           returns (GetResponse);
  rpc Msetnx(MsetnxRequest)           returns (BoolResponse);

  // --- bitmaps ---

  rpc Getbit(GetbitRequest)           returns (IntResponse);
  rpc Setbit(SetbitRequest)           returns (IntResponse);
  rpc Bitcount(BitcountRequest)       returns (IntResponse);
  rpc Bitpos(BitposRequest)           returns (IntResponse);
  rpc Bitop(BitopRequest)             returns (IntResponse);

  // --- sets (new) ---

  rpc Smove(SmoveRequest)             returns (BoolResponse);
  rpc Sintercard(SintercardRequest)   returns (IntResponse);

  // --- lists (new) ---

  rpc Lmpop(LmpopRequest)             returns (LmpopResponse);

  // --- sorted sets (new) ---

  rpc Zmpop(ZmpopRequest)             returns (ZmpopResponse);

  // --- hash (new) ---

  rpc Hrandfield(HrandfieldRequest)   returns (ArrayResponse);

  // --- sorted set random ---

  rpc Zrandmember(ZrandmemberRequest) returns (ArrayResponse);

  // --- streaming ---
  // bidirectional streaming for batch operations, matching RESP3 pipelining.

  rpc Pipeline(stream PipelineRequest) returns (stream PipelineResponse);
}

// ---------------------------------------------------------------------------
// shared response types
// ---------------------------------------------------------------------------

message IntResponse {
  int64 value = 1;
}

message BoolResponse {
  bool value = 1;
}

message FloatResponse {
  string value = 1;
}

message StatusResponse {
  string status = 1;
}

message BoolArrayResponse {
  repeated bool values = 1;
}

// ---------------------------------------------------------------------------
// strings
// ---------------------------------------------------------------------------

message GetRequest {
  string key = 1;
}

message GetResponse {
  optional bytes value = 1;
}

message SetRequest {
  string key = 1;
  bytes value = 2;
  // expire time in seconds. 0 means no expiration.
  uint64 expire_seconds = 3;
  // expire time in milliseconds. takes precedence over expire_seconds.
  uint64 expire_millis = 4;
  // NX: only set if key does not exist.
  bool nx = 5;
  // XX: only set if key already exists.
  bool xx = 6;
}

message SetResponse {
  // true if the key was set, false if NX/XX condition prevented it.
  bool ok = 1;
}

message DelRequest {
  repeated string keys = 1;
}

message DelResponse {
  int64 deleted = 1;
}

message MGetRequest {
  repeated string keys = 1;
}

message MGetResponse {
  // one entry per requested key. missing keys have value unset.
  repeated OptionalValue values = 1;
}

message OptionalValue {
  optional bytes value = 1;
}

message MSetRequest {
  repeated KeyValue pairs = 1;
}

message KeyValue {
  string key = 1;
  bytes value = 2;
}

message MSetResponse {}

message IncrRequest {
  string key = 1;
}

message IncrByRequest {
  string key = 1;
  int64 delta = 2;
}

message DecrByRequest {
  string key = 1;
  int64 delta = 2;
}

message IncrByFloatRequest {
  string key = 1;
  double delta = 2;
}

message AppendRequest {
  string key = 1;
  bytes value = 2;
}

message StrlenRequest {
  string key = 1;
}

message GetDelRequest {
  string key = 1;
}

message GetExRequest {
  string key = 1;
  // set expiry in seconds (ignored if expire_millis > 0).
  uint64 expire_seconds = 2;
  // set expiry in milliseconds (takes precedence over expire_seconds).
  uint64 expire_millis = 3;
  // remove the existing expiry, making the key persistent.
  bool persist = 4;
}

message GetRangeRequest {
  string key = 1;
  int64 start = 2;
  int64 end = 3;
}

message SetRangeRequest {
  string key = 1;
  int64 offset = 2;
  bytes value = 3;
}

message GetsetRequest {
  string key = 1;
  bytes value = 2;
}

message MsetnxRequest {
  repeated KeyValue pairs = 1;
}

message GetbitRequest {
  string key = 1;
  uint64 offset = 2;
}

message SetbitRequest {
  string key = 1;
  uint64 offset = 2;
  uint32 value = 3;
}

message BitcountRequest {
  string key = 1;
  bool has_range = 2;
  int64 start = 3;
  int64 end = 4;
  // "BYTE" or "BIT" (only used when has_range is true)
  string unit = 5;
}

message BitposRequest {
  string key = 1;
  uint32 bit = 2;
  bool has_range = 3;
  int64 start = 4;
  int64 end = 5;
  string unit = 6;
}

message BitopRequest {
  // "AND", "OR", "XOR", or "NOT"
  string op = 1;
  string dest = 2;
  repeated string keys = 3;
}

// ---------------------------------------------------------------------------
// keys
// ---------------------------------------------------------------------------

message ExistsRequest {
  repeated string keys = 1;
}

message ExpireRequest {
  string key = 1;
  uint64 seconds = 2;
}

message PExpireRequest {
  string key = 1;
  uint64 milliseconds = 2;
}

message PersistRequest {
  string key = 1;
}

message TtlRequest {
  string key = 1;
}

message PTtlRequest {
  string key = 1;
}

message TtlResponse {
  // -2 = key does not exist, -1 = no expiry, >= 0 = remaining time.
  int64 value = 1;
}

message TypeRequest {
  string key = 1;
}

message TypeResponse {
  string type_name = 1;
}

message KeysRequest {
  string pattern = 1;
}

message KeysResponse {
  repeated string keys = 1;
}

message RenameRequest {
  string key = 1;
  string new_key = 2;
}

message ScanRequest {
  uint64 cursor = 1;
  uint32 count = 2;
  optional string pattern = 3;
}

message ScanResponse {
  uint64 cursor = 1;
  repeated string keys = 2;
}

message CopyRequest {
  string source = 1;
  string destination = 2;
  // overwrite the destination key if it already exists.
  bool replace = 3;
}

message RandomKeyRequest {}

message TouchRequest {
  repeated string keys = 1;
}

message ExpiretimeRequest {
  string key = 1;
}

message PexpiretimeRequest {
  string key = 1;
}

message ExpireatRequest {
  string key = 1;
  uint64 timestamp = 2;
}

message PexpireatRequest {
  string key = 1;
  uint64 timestamp_ms = 2;
}

// ---------------------------------------------------------------------------
// lists
// ---------------------------------------------------------------------------

message LPushRequest {
  string key = 1;
  repeated bytes values = 2;
}

message RPushRequest {
  string key = 1;
  repeated bytes values = 2;
}

message LPopRequest {
  string key = 1;
}

message RPopRequest {
  string key = 1;
}

message LRangeRequest {
  string key = 1;
  int64 start = 2;
  int64 stop = 3;
}

message ArrayResponse {
  repeated bytes values = 1;
}

message LLenRequest {
  string key = 1;
}

message LIndexRequest {
  string key = 1;
  int64 index = 2;
}

message LSetRequest {
  string key = 1;
  int64 index = 2;
  bytes value = 3;
}

message LTrimRequest {
  string key = 1;
  int64 start = 2;
  int64 stop = 3;
}

message LInsertRequest {
  string key = 1;
  // insert before (true) or after (false) the pivot.
  bool before = 2;
  bytes pivot = 3;
  bytes value = 4;
}

message LRemRequest {
  string key = 1;
  // count > 0: remove from head; count < 0: remove from tail; 0: remove all.
  int64 count = 2;
  bytes value = 3;
}

message LPosRequest {
  string key = 1;
  bytes value = 2;
  // maximum number of positions to return. absent or 0 returns the first match.
  optional uint32 count = 3;
}

message LMoveRequest {
  string source = 1;
  string destination = 2;
  // pop from the left (true) or right (false) of source.
  bool src_left = 3;
  // push to the left (true) or right (false) of destination.
  bool dst_left = 4;
}

message LmpopRequest {
  repeated string keys = 1;
  // true = LEFT, false = RIGHT
  bool left = 2;
  uint32 count = 3;
}

message LmpopResponse {
  bool found = 1;
  string key = 2;
  repeated bytes elements = 3;
}

// ---------------------------------------------------------------------------
// hashes
// ---------------------------------------------------------------------------

message HSetRequest {
  string key = 1;
  repeated FieldValue fields = 2;
}

message FieldValue {
  string field = 1;
  bytes value = 2;
}

message HGetRequest {
  string key = 1;
  string field = 2;
}

message HGetAllRequest {
  string key = 1;
}

message HashResponse {
  repeated FieldValue fields = 1;
}

message HDelRequest {
  string key = 1;
  repeated string fields = 2;
}

message HExistsRequest {
  string key = 1;
  string field = 2;
}

message HLenRequest {
  string key = 1;
}

message HIncrByRequest {
  string key = 1;
  string field = 2;
  int64 delta = 3;
}

message HKeysRequest {
  string key = 1;
}

message HValsRequest {
  string key = 1;
}

message HMGetRequest {
  string key = 1;
  repeated string fields = 2;
}

message OptionalArrayResponse {
  repeated OptionalValue values = 1;
}

message HScanRequest {
  string key = 1;
  uint64 cursor = 2;
  optional string pattern = 3;
  // hint for how many fields to return per call. server may return more or fewer.
  uint32 count = 4;
}

message HScanResponse {
  uint64 cursor = 1;
  repeated FieldValue fields = 2;
}

message HrandfieldRequest {
  string key = 1;
  bool has_count = 2;
  int32 count = 3;
  bool with_values = 4;
}

// ---------------------------------------------------------------------------
// sets
// ---------------------------------------------------------------------------

message SAddRequest {
  string key = 1;
  repeated string members = 2;
}

message SRemRequest {
  string key = 1;
  repeated string members = 2;
}

message SMembersRequest {
  string key = 1;
}

message SIsMemberRequest {
  string key = 1;
  string member = 2;
}

message SCardRequest {
  string key = 1;
}

message SUnionRequest {
  repeated string keys = 1;
}

message SInterRequest {
  repeated string keys = 1;
}

message SDiffRequest {
  repeated string keys = 1;
}

message SUnionStoreRequest {
  string destination = 1;
  repeated string keys = 2;
}

message SInterStoreRequest {
  string destination = 1;
  repeated string keys = 2;
}

message SDiffStoreRequest {
  string destination = 1;
  repeated string keys = 2;
}

message SRandMemberRequest {
  string key = 1;
  // positive: return that many unique members; negative: allow repeats.
  int32 count = 2;
}

message SPopRequest {
  string key = 1;
  uint32 count = 2;
}

message SMisMemberRequest {
  string key = 1;
  repeated string members = 2;
}

message SmoveRequest {
  string source = 1;
  string destination = 2;
  string member = 3;
}

message SintercardRequest {
  repeated string keys = 1;
  // 0 means no limit
  uint64 limit = 2;
}

message SScanRequest {
  string key = 1;
  uint64 cursor = 2;
  optional string pattern = 3;
  uint32 count = 4;
}

message SScanResponse {
  uint64 cursor = 1;
  repeated string members = 2;
}

// ---------------------------------------------------------------------------
// sorted sets
// ---------------------------------------------------------------------------

message ZAddRequest {
  string key = 1;
  repeated ScoreMember members = 2;
  bool nx = 3;
  bool xx = 4;
  bool gt = 5;
  bool lt = 6;
  bool ch = 7;
}

message ScoreMember {
  double score = 1;
  string member = 2;
}

message ZRemRequest {
  string key = 1;
  repeated string members = 2;
}

message ZScoreRequest {
  string key = 1;
  string member = 2;
}

message OptionalFloatResponse {
  optional double value = 1;
}

message ZRankRequest {
  string key = 1;
  string member = 2;
}

message OptionalIntResponse {
  optional int64 value = 1;
}

message ZCardRequest {
  string key = 1;
}

message ZRangeRequest {
  string key = 1;
  int64 start = 2;
  int64 stop = 3;
  bool with_scores = 4;
}

message ZRangeResponse {
  // when with_scores is false, only member is populated.
  repeated ScoreMember members = 1;
}

message ZRevRankRequest {
  string key = 1;
  string member = 2;
}

message ZRevRangeRequest {
  string key = 1;
  int64 start = 2;
  int64 stop = 3;
  bool with_scores = 4;
}

message ZCountRequest {
  string key = 1;
  // min/max use redis score range syntax: "-inf", "+inf", "(5", "5".
  string min = 2;
  string max = 3;
}

message ZIncrByRequest {
  string key = 1;
  double delta = 2;
  string member = 3;
}

message ZRangeByScoreRequest {
  string key = 1;
  string min = 2;
  string max = 3;
  optional int64 offset = 4;
  optional int64 count = 5;
  bool with_scores = 6;
}

message ZRevRangeByScoreRequest {
  string key = 1;
  // note: max comes before min for reverse range queries.
  string max = 2;
  string min = 3;
  optional int64 offset = 4;
  optional int64 count = 5;
  bool with_scores = 6;
}

message ZPopMinRequest {
  string key = 1;
  uint32 count = 2;
}

message ZPopMaxRequest {
  string key = 1;
  uint32 count = 2;
}

message ZDiffRequest {
  repeated string keys = 1;
  bool with_scores = 2;
}

message ZInterRequest {
  repeated string keys = 1;
  bool with_scores = 2;
}

message ZUnionRequest {
  repeated string keys = 1;
  bool with_scores = 2;
}

message ZmpopRequest {
  repeated string keys = 1;
  // true = MIN, false = MAX
  bool min = 2;
  uint32 count = 3;
}

message ZmpopResponse {
  bool found = 1;
  string key = 2;
  repeated ScoreMember members = 3;
}

message ZrandmemberRequest {
  string key = 1;
  bool has_count = 2;
  int32 count = 3;
  bool with_scores = 4;
}

message ZScanRequest {
  string key = 1;
  uint64 cursor = 2;
  optional string pattern = 3;
  uint32 count = 4;
}

message ZScanResponse {
  uint64 cursor = 1;
  repeated ScoreMember members = 2;
}

// ---------------------------------------------------------------------------
// vectors
// ---------------------------------------------------------------------------

enum VectorMetric {
  VECTOR_METRIC_COSINE = 0;
  VECTOR_METRIC_EUCLIDEAN = 1;
  VECTOR_METRIC_INNER_PRODUCT = 2;
}

enum VectorQuantization {
  VECTOR_QUANTIZATION_NONE = 0;
  VECTOR_QUANTIZATION_F16 = 1;
  VECTOR_QUANTIZATION_I8 = 2;
}

message VAddRequest {
  string key = 1;
  string element = 2;
  // packed IEEE 754 floats — no parsing overhead.
  repeated float vector = 3 [packed = true];
  VectorMetric metric = 4;
  VectorQuantization quantization = 5;
  optional uint32 connectivity = 6;
  optional uint32 ef_construction = 7;
}

message VAddBatchEntry {
  string element = 1;
  repeated float vector = 2 [packed = true];
}

message VAddBatchRequest {
  string key = 1;
  repeated VAddBatchEntry entries = 2;
  VectorMetric metric = 3;
  VectorQuantization quantization = 4;
  optional uint32 connectivity = 5;
  optional uint32 ef_construction = 6;
}

message VSimRequest {
  string key = 1;
  repeated float query = 2 [packed = true];
  uint32 count = 3;
  optional uint32 ef_search = 4;
}

message VSimResponse {
  repeated VSimResult results = 1;
}

message VSimResult {
  string element = 1;
  float distance = 2;
}

message VRemRequest {
  string key = 1;
  string element = 2;
}

message VGetRequest {
  string key = 1;
  string element = 2;
}

message VGetResponse {
  optional bool exists = 1;
  repeated float vector = 2 [packed = true];
}

message VCardRequest {
  string key = 1;
}

message VDimRequest {
  string key = 1;
}

message VInfoRequest {
  string key = 1;
}

message VInfoResponse {
  bool exists = 1;
  repeated FieldValue info = 2;
}

// ---------------------------------------------------------------------------
// server
// ---------------------------------------------------------------------------

message PingRequest {
  optional string message = 1;
}

message PingResponse {
  string message = 1;
}

message FlushDbRequest {
  bool async = 1;
}

message DbSizeRequest {}

message InfoRequest {
  optional string section = 1;
}

message InfoResponse {
  string info = 1;
}

message EchoRequest {
  string message = 1;
}

message EchoResponse {
  string message = 1;
}

message DecrRequest {
  string key = 1;
}

message UnlinkRequest {
  repeated string keys = 1;
}

message BgSaveRequest {}

message BgRewriteAofRequest {}

message TimeRequest {}

message TimeResponse {
  int64 seconds = 1;
  int64 microseconds = 2;
}

message LastSaveRequest {}

// ---------------------------------------------------------------------------
// slowlog
// ---------------------------------------------------------------------------

message SlowLogGetRequest {
  optional uint32 count = 1;
}

message SlowLogGetResponse {
  repeated SlowLogEntry entries = 1;
}

message SlowLogEntry {
  uint64 id = 1;
  uint64 timestamp_unix = 2;
  uint64 duration_micros = 3;
  string command = 4;
}

message SlowLogLenRequest {}

message SlowLogResetRequest {}

// ---------------------------------------------------------------------------
// pub/sub
// ---------------------------------------------------------------------------

message PublishRequest {
  string channel = 1;
  bytes message = 2;
}

message SubscribeRequest {
  repeated string channels = 1;
  repeated string patterns = 2;
}

message SubscribeEvent {
  // "message" for exact channel match, "pmessage" for pattern match.
  string kind = 1;
  string channel = 2;
  bytes data = 3;
  // the pattern that matched (only set for pmessage).
  optional string pattern = 4;
}

message PubSubChannelsRequest {
  optional string pattern = 1;
}

message PubSubNumSubRequest {
  repeated string channels = 1;
}

message PubSubNumSubResponse {
  repeated ChannelCount counts = 1;
}

message PubSubNumPatRequest {}

message ChannelCount {
  string channel = 1;
  int64 count = 2;
}

// ---------------------------------------------------------------------------
// pipeline (bidirectional streaming)
// ---------------------------------------------------------------------------

message PipelineRequest {
  uint64 id = 1;
  oneof command {
    GetRequest get = 2;
    SetRequest set = 3;
    DelRequest del = 4;
    ExistsRequest exists = 5;
    IncrRequest incr = 6;
